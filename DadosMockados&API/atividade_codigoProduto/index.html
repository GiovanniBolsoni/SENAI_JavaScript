<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código Produto</title>

    <link rel="stylesheet" href="styles/style.css">
    <script defer src="scripts/script.js"></script>
</head>
<body>
    <div id="container">
        <h1>Catálogo de Produtos</h1>

        <div id="busca">
            <input type="text" id="digita-codigo" placeholder="Digite o código do produto">
            <button id="botao-buscar">Buscar</button>
        </div>

        <div id="mensagem-erro"></div>

        <div id="caixa-produtos">
            <p>Nome: <span id="nome-produto"></span></p>
            <p>Preço: <span id="preco-produto"></span></p>
            <p>Categoria: <span id="categoria-produto"></span></p>
        </div>
    </div>
</body>
</html>
