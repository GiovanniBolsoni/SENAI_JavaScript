<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista dinâmica</title>
  
  <link rel="stylesheet" href="styles/style.css">
  <script defer src="scripts/script.js"></script>

</head>
<body>
    <div id="caixa">
      <h1 id="titulo">Lista de tarefas</h1>

      <div id="grupo-tarefas">
        <input type="text" id="input-item" placeholder="Digite uma tarefa">
        <button id="botao-adicionar">➕ Adicionar tarefa</button>
      </div>
      
      <p id="aviso-tarefa"></p>

      <ul id="lista"></ul>

      <button id="limpa-itens">Limpar tarefas</button>
    </div>
</body>
</html>
