<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Simples</title>
    <link rel="stylesheet" href="styles/style.css">
    <script defer src="Scripts/script.js"></script>
</head>
<body>
    <div id="caixalogin">
        <h2 id="titulo">- | Login | -</h2>
        <p id="texto">Insira seu <strong>usuário</strong> e <strong>senha</strong></p>
        <input type="username" id="caixausuario" placeholder="Usuário:">
        <input type="password" id="caixasenha" placeholder="Senha:">
        <button id="botao">Entrar</button>
        <p id="mensagemlogin"></p>
    </div>
</body>
</html>
